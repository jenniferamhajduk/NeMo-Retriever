{{- define "nemo-retriever.llmApiKeyEnv" -}}
{{- $root := . -}}
{{- $secret := $root.Values.serviceConfig.llm.apiKeySecret -}}
{{- if $secret.name -}}
- name: NEMO_RETRIEVER_LLM_API_KEY
  valueFrom:
    secretKeyRef:
      name: {{ $secret.name | quote }}
      key: {{ $secret.key | default "api_key" | quote }}
      optional: {{ $secret.optional | default false }}
{{- else if and $root.Values.nims.enabled $root.Values.nimOperator.answer_llm.enabled -}}
- name: NEMO_RETRIEVER_LLM_API_KEY
  valueFrom:
    secretKeyRef:
      name: {{ $root.Values.nimOperator.answer_llm.authSecret | quote }}
      key: "NGC_API_KEY"
      optional: false
{{- end -}}
{{- end -}}
{{- $svc := .Values.service -}}
{{- if and $svc.installFfmpeg $svc.env -}}
{{- range $env := $svc.env }}
{{- if and (hasKey $env "name") (eq $env.name "INSTALL_FFMPEG") }}
{{- fail "service.installFfmpeg and service.env cannot both set INSTALL_FFMPEG; use service.installFfmpeg for Helm-managed ffmpeg installation." }}
{{- end }}
{{- end }}
{{- end }}
{{- if eq .Values.topology.mode "standalone" }}
# =========================================================================
# Standalone mode — single Deployment with both worker pools
# =========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nemo-retriever.fullname" . }}
  labels:
    {{- include "nemo-retriever.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ $svc.replicas }}
  {{- end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nemo-retriever.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemo-retriever.selectorLabels" . | nindent 8 }}
        {{- with $svc.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with $svc.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "nemo-retriever.serviceAccountName" . }}
      {{- include "nemo-retriever.imagePullSecrets" . | nindent 6 }}
      {{- with $svc.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with $svc.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $svc.terminationGracePeriodSeconds }}
      {{- with $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nemo-retriever
          image: "{{ include "nemo-retriever.runtime.image.repository" . }}:{{ include "nemo-retriever.runtime.image.tag" . }}"
          imagePullPolicy: {{ include "nemo-retriever.runtime.image.pullPolicy" . }}
          {{- with $svc.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - retriever
            - service
            - start
            - --config
            - /etc/nemo-retriever/retriever-service.yaml
          ports:
            - name: http
              containerPort: {{ .Values.serviceConfig.server.port }}
              protocol: TCP
          env:
            - name: NEMO_RETRIEVER_SERVICE_CONFIG
              value: /etc/nemo-retriever/retriever-service.yaml
            {{- if .Values.retrieverResults.enabled }}
            - name: NEMO_RETRIEVER_RESULTS_DIR
              value: {{ .Values.retrieverResults.mountPath | quote }}
            - name: NEMO_RETRIEVER_RESULTS_TTL_SECONDS
              value: {{ .Values.retrieverResults.ttlSeconds | quote }}
            {{- end }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NGC_API_KEY
                  optional: true
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NGC_API_KEY
                  optional: true
            {{- $llmApiKeyEnv := include "nemo-retriever.llmApiKeyEnv" . }}
            {{- if $llmApiKeyEnv }}
{{ $llmApiKeyEnv | nindent 12 }}
            {{- end }}
            {{- if $svc.installFfmpeg }}
            - name: INSTALL_FFMPEG
              value: "true"
            {{- end }}
            {{ include "nemo-retriever.serviceOtelEnv" (dict "context" $ "role" "standalone") | nindent 12 }}
            {{- with $svc.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $svc.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- $resources := deepCopy $svc.resources }}
            {{- $gpuEnabled := or $svc.gpu.enabled .Values.serviceConfig.localModels.enabled }}
            {{- if $gpuEnabled }}
            {{- $gpuCount := $svc.gpu.count | int }}
            {{- if eq $gpuCount 0 }}{{- $gpuCount = 1 }}{{- end }}
            {{- $_ := set ($resources.limits | default dict) "nvidia.com/gpu" $gpuCount -}}
            {{- end }}
            {{- toYaml $resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nemo-retriever
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.retrieverResults.enabled }}
            - name: retriever-results
              mountPath: {{ .Values.retrieverResults.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- with $svc.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $svc.startupProbe.enabled }}
          startupProbe:
            {{- omit $svc.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.livenessProbe.enabled }}
          livenessProbe:
            {{- omit $svc.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.readinessProbe.enabled }}
          readinessProbe:
            {{- omit $svc.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nemo-retriever.configMapName" . }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "nemo-retriever.pvcName" . }}
        {{- end }}
        {{- if .Values.retrieverResults.enabled }}
        - name: retriever-results
          persistentVolumeClaim:
            claimName: {{ include "nemo-retriever.retrieverResultsPvcName" . }}
        {{- end }}
        {{- with $svc.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- else }}
# =========================================================================
# Split mode — three Deployments: gateway, realtime, batch
# =========================================================================
{{- $roles := list "gateway" "realtime" "batch" }}
{{- range $role := $roles }}
{{- $roleCfg := index $.Values.topology $role }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nemo-retriever.role.fullname" (dict "context" $ "role" $role) }}
  labels:
    {{- include "nemo-retriever.role.labels" (dict "context" $ "role" $role) | nindent 4 }}
spec:
  {{- if not (and (hasKey $roleCfg "hpa") (index $roleCfg "hpa").enabled) }}
  replicas: {{ $roleCfg.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "nemo-retriever.role.selectorLabels" (dict "context" $ "role" $role) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemo-retriever.role.selectorLabels" (dict "context" $ "role" $role) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
    spec:
      serviceAccountName: {{ include "nemo-retriever.serviceAccountName" $ }}
      {{- include "nemo-retriever.imagePullSecrets" $ | nindent 6 }}
      {{- with $svc.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $roleCfg.terminationGracePeriodSeconds | default 15 }}
      {{- with $roleCfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $roleCfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $roleCfg.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if ne $role "gateway" }}
      initContainers:
        - name: wait-for-gateway
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              GATEWAY="{{ include "nemo-retriever.role.fullname" (dict "context" $ "role" "gateway") }}"
              PORT="{{ $.Values.networkService.port }}"
              echo "Waiting for gateway at ${GATEWAY}:${PORT} ..."
              until wget -qO- --timeout=3 "http://${GATEWAY}:${PORT}/v1/health" >/dev/null 2>&1; do
                echo "  gateway not ready — retrying in 3s"
                sleep 3
              done
              echo "Gateway is healthy — starting worker"
      {{- end }}
      containers:
        - name: nemo-retriever
          image: "{{ include "nemo-retriever.runtime.image.repository" $ }}:{{ include "nemo-retriever.runtime.image.tag" $ }}"
          imagePullPolicy: {{ include "nemo-retriever.runtime.image.pullPolicy" $ }}
          args:
            - retriever
            - service
            - start
            - --config
            - /etc/nemo-retriever/retriever-service.yaml
          ports:
            - name: http
              containerPort: {{ $.Values.serviceConfig.server.port }}
              protocol: TCP
          env:
            - name: NEMO_RETRIEVER_SERVICE_CONFIG
              value: /etc/nemo-retriever/retriever-service.yaml
            {{- if $.Values.retrieverResults.enabled }}
            - name: NEMO_RETRIEVER_RESULTS_TTL_SECONDS
              value: {{ $.Values.retrieverResults.ttlSeconds | quote }}
            {{- if eq $role "gateway" }}
            - name: NEMO_RETRIEVER_RESULTS_DIR
              value: {{ $.Values.retrieverResults.mountPath | quote }}
            {{- end }}
            {{- end }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.ngcApiSecret.name }}
                  key: NGC_API_KEY
                  optional: true
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.ngcApiSecret.name }}
                  key: NGC_API_KEY
                  optional: true
            {{- $llmApiKeyEnv := include "nemo-retriever.llmApiKeyEnv" $ }}
            {{- if $llmApiKeyEnv }}
{{ $llmApiKeyEnv | nindent 12 }}
            {{- end }}
            {{- if $svc.installFfmpeg }}
            - name: INSTALL_FFMPEG
              value: "true"
            {{- end }}
            {{ include "nemo-retriever.serviceOtelEnv" (dict "context" $ "role" $role) | nindent 12 }}
            {{- with $svc.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- $resources := deepCopy $roleCfg.resources }}
            {{- $roleGpuEnabled := and (hasKey $roleCfg "gpu") (index $roleCfg "gpu").enabled }}
            {{- $gpuEnabled := or $roleGpuEnabled (and (ne $role "gateway") $.Values.serviceConfig.localModels.enabled) }}
            {{- if $gpuEnabled }}
            {{- $gpuCount := 0 }}
            {{- if $roleGpuEnabled }}{{- $gpuCount = (index $roleCfg "gpu").count | int }}{{- end }}
            {{- if and (not $roleGpuEnabled) $.Values.serviceConfig.localModels.enabled }}{{- $gpuCount = 1 }}{{- end }}
            {{- if and $roleGpuEnabled (eq $gpuCount 0) }}{{- $gpuCount = 1 }}{{- end }}
            {{- $_ := set ($resources.limits | default dict) "nvidia.com/gpu" $gpuCount -}}
            {{- end }}
            {{- toYaml $resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nemo-retriever
              readOnly: true
            {{- if and $.Values.retrieverResults.enabled (eq $role "gateway") }}
            - name: retriever-results
              mountPath: {{ $.Values.retrieverResults.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
          {{- if $svc.startupProbe.enabled }}
          startupProbe:
            {{- omit $svc.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.livenessProbe.enabled }}
          livenessProbe:
            {{- omit $svc.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if $svc.readinessProbe.enabled }}
          readinessProbe:
            {{- omit $svc.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nemo-retriever.role.configMapName" (dict "context" $ "role" $role) }}
        - name: tmp
          emptyDir: {}
        {{- if and $.Values.retrieverResults.enabled (eq $role "gateway") }}
        - name: retriever-results
          persistentVolumeClaim:
            claimName: {{ include "nemo-retriever.retrieverResultsPvcName" $ }}
        {{- end }}
{{- end }}
{{- end }}

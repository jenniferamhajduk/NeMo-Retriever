    resources: {}
    nodeSelector: {}
    tolerations: []
    expose:
      service:
        type: ClusterIP
        port: 9000
        grpcPort: 50051
    otel:
      enabled: null
      serviceName: ""
      endpoint: ""
      env: {}
    env:
      - name: NIM_TAGS_SELECTOR
        value: "name=parakeet-1-1b-ctc-en-us,mode=ofl,vad=default,diarizer=disabled"
      - name: NIM_TRITON_LOG_VERBOSE
        value: "1"

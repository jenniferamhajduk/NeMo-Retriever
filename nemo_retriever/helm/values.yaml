      tag: "1.5.0"
      pullPolicy: IfNotPresent
      pullSecrets:
        - ngc-secret
    authSecret: ngc-api
    # Per-NIM NIMCache GPU/profile filter. See `nimOperator.modelProfile`
    # above for the shape; non-empty REPLACES the chart-wide default.
    modelProfile: {}
    storage:

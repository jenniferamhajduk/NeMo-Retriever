# Managed Helm target for the current main/nightly service image.
# The scheduler must set HARNESS_HELM_SERVICE_IMAGE_REPOSITORY and
# HARNESS_HELM_SERVICE_IMAGE_TAG to an immutable image produced from this checkout.
helm_chart: ../../helm
helm_release: nemo-retriever-helm-nightly
helm_namespace: nemo-retriever-helm-nightly
helm_values_file: ../helm-profiles/core.yaml
helm_timeout: 1800
readiness_timeout: 1800
helm_service_local_port: 17670
helm_bin: microk8s helm
kubectl_bin: microk8s kubectl
helm_sudo: true
kubectl_sudo: true
helm_set:
  ngcImagePullSecret.create: false
  ngcImagePullSecret.name: ngc-secret
  ngcApiSecret.create: false
  ngcApiSecret.name: ngc-api
